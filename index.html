<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <title>素食食谱与营养规划器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 30px 0;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .ingredient-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .ingredient-tag {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .ingredient-tag .remove {
            cursor: pointer;
            font-weight: bold;
            color: #d32f2f;
            font-size: 1.2em;
            line-height: 1;
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .recipe-card {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .recipes-grid {
                grid-template-columns: 1fr;
            }
        }

        .recipe-card h3 {
            color: #d84315;
            margin-bottom: 10px;
        }

        .recipe-card p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .nutrients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .nutrient-card {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .nutrient-card h4 {
            color: #00695c;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .nutrient-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #004d40;
        }

        .nutrient-unit {
            font-size: 0.9em;
            color: #666;
        }

        .missing-nutrients {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 10px;
            padding: 20px;
            margin-top: 15px;
        }

        .missing-nutrients h3 {
            color: #c2185b;
            margin-bottom: 15px;
        }

        .missing-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .missing-item-name {
            font-weight: 600;
            color: #555;
        }

        .missing-item-amount {
            color: #d32f2f;
            font-weight: 600;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            color: #856404;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            color: #0d47a1;
            font-size: 0.9em;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                max-width: 100%;
            }

            h1 {
                font-size: 1.8em;
            }

            .section {
                padding: 15px;
                border-radius: 12px;
            }

            .section-title {
                font-size: 1.2em;
            }

            .btn {
                padding: 14px 20px;
                font-size: 0.95em;
                width: 100%;
                margin-bottom: 10px;
            }

            .btn-secondary {
                margin-left: 0;
            }

            input[type="text"],
            select {
                padding: 14px;
                font-size: 16px; /* 防止iOS自动缩放 */
            }

            .ingredient-tag {
                font-size: 0.85em;
                padding: 6px 12px;
            }

            .nutrients-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .nutrient-card {
                padding: 12px;
            }

            .nutrient-value {
                font-size: 1.3em;
            }

            table {
                font-size: 0.9em;
            }

            table th,
            table td {
                padding: 8px;
            }

            .recipe-card {
                padding: 15px;
            }

            .recipe-card h3 {
                font-size: 1.1em;
            }

            .recipe-card p {
                font-size: 0.9em;
                line-height: 1.5;
            }
        }

        /* 小屏幕手机优化 */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .section {
                padding: 12px;
            }

            h1 {
                font-size: 1.5em;
            }

            .subtitle {
                font-size: 0.9em;
            }

            .nutrients-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.85em;
            }

            table th,
            table td {
                padding: 6px 4px;
            }
        }

        /* 触摸优化 */
        .btn,
        .ingredient-tag .remove {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* 防止双击缩放 */
        * {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌿 素食食谱与营养规划器</h1>
            <p class="subtitle">符合佛教素食规范 - 排除五辛</p>
        </header>

        <div class="main-content">
            <!-- User Info Section -->
            <div class="section">
                <h2 class="section-title">👤 个人信息</h2>
                <div class="input-group">
                    <label for="user-age">年龄：</label>
                    <input type="number" id="user-age" placeholder="例如：30" min="1" max="120" value="30" onchange="updateDailyMealPlan(); updateMissingNutrients();">
                </div>
                <div class="input-group">
                    <label for="user-gender">性别：</label>
                    <select id="user-gender" onchange="updateDailyMealPlan(); updateMissingNutrients();">
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div class="info-box" style="margin-top: 15px;">
                    <strong>提示：</strong> 填写个人信息后，系统会根据您的年龄和性别提供个性化的营养建议和食谱。
                </div>
            </div>

            <!-- Ingredient Input Section -->
            <div class="section">
                <h2 class="section-title">📥 导入食材</h2>
                <div class="info-box">
                    <strong>注意：</strong> 本应用排除大蒜、洋葱、韭菜、葱和兴渠（佛教素食中的五辛）。
                </div>
                <div class="input-group">
                    <label for="ingredient-select">选择食材：</label>
                    <select id="ingredient-select">
                        <option value="">请选择食材...</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="ingredient-amount">数量（克）：</label>
                    <input type="text" id="ingredient-amount" placeholder="例如：100" value="100">
                </div>
                <button class="btn" onclick="addIngredient()">添加食材</button>
                <button class="btn btn-secondary" onclick="clearIngredients()" style="margin-left: 10px;">清空全部</button>
                
                <div class="ingredient-list" id="ingredient-list"></div>
            </div>

            <!-- Daily Meal Plan Section -->
            <div class="section full-width">
                <h2 class="section-title">🍽️ 每日完整食谱</h2>
                <div id="daily-meal-container">
                    <p style="color: #999; text-align: center; padding: 20px;">
                        添加食材以生成完整的每日食谱（早餐、午餐、晚餐）
                    </p>
                </div>
            </div>

            <!-- Recipe Suggestions Section -->
            <div class="section full-width">
                <h2 class="section-title">🍲 食谱建议</h2>
                <div id="recipes-container">
                    <p style="color: #999; text-align: center; padding: 20px;">
                        添加食材以查看食谱建议
                    </p>
                </div>
            </div>

            <!-- Nutrition Analysis Section -->
            <div class="section full-width">
                <h2 class="section-title">📊 营养分析</h2>
                <div id="nutrition-container">
                    <p style="color: #999; text-align: center; padding: 20px;">
                        添加食材以查看营养分析
                    </p>
                </div>
            </div>

            <!-- Missing Nutrients Section -->
            <div class="section full-width">
                <h2 class="section-title">⚠️ 缺失的每日营养素</h2>
                <div id="missing-nutrients-container">
                    <p style="color: #999; text-align: center; padding: 20px;">
                        添加食材以查看缺失的营养素
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>

        const ingredientsDB = {

            'eggplant': { name: '茄子', nutrients: { protein: 1, calcium: 9, iron: 0.2, vitaminC: 2.2, vitaminB12: 0, omega3: 0, fiber: 3, calories: 25 } }
        };

        // 根据年龄和性别计算每日营养需求
        function getDailyRequirements(age, gender) {
            // 基础需求
            let baseCalories = gender === 'male' ? 2200 : 1800;
            let baseProtein = gender === 'male' ? 56 : 46; // 克
            let baseIron = gender === 'male' ? 8 : 18; // 毫克（女性需要更多）
            let baseCalcium = 1000; // 毫克
            
            // 根据年龄调整
            if (age < 18) {
                baseCalories = gender === 'male' ? 2400 : 2000;
                baseProtein = gender === 'male' ? 52 : 46;
                baseCalcium = 1300;
            } else if (age >= 51) {
                baseCalcium = 1200;
                if (gender === 'female') {
                    baseIron = 8;
                }
            }
            
            return {
                protein: baseProtein,
                calcium: baseCalcium,
                iron: baseIron,
                vitaminC: 90, // 毫克
                vitaminB1: gender === 'male' ? 1.2 : 1.1, // 毫克
                vitaminB2: gender === 'male' ? 1.3 : 1.1, // 毫克
                vitaminB3: gender === 'male' ? 16 : 14, // 毫克
                vitaminB6: gender === 'male' ? 1.3 : 1.3, // 毫克
                vitaminB9: 400, // 微克（叶酸）
                vitaminB12: 2.4, // 微克（通常需要补充）
                omega3: 1.6, // 克
                fiber: 25, // 克
                calories: baseCalories, // 千卡
                zinc: gender === 'male' ? 11 : 8, // 毫克
                magnesium: gender === 'male' ? 400 : 310, // 毫克
                vitaminE: 15, // 毫克
                vitaminD: 15, // 微克
                vitaminK: gender === 'male' ? 120 : 90, // 微克
                selenium: 55, // 微克
                potassium: 4700, // 毫克
                phosphorus: 700 // 毫克
            };
        }

        // 食谱数据库 - 包含类别和详细制作方法
        const recipesDB = {

            const select = document.getElementById('ingredient-select');
            Object.keys(ingredientsDB).forEach(key => {

                option.value = key;
                option.textContent = ingredientsDB[key].name;

        // Add ingredient to list
        function addIngredient() {
            const select = document.getElementById('ingredient-select');
            const amountInput = document.getElementById('ingredient-amount');
            
            const ingredientKey = select.value;
            const amount = parseFloat(amountInput.value) || 100;

            if (!ingredientKey) {
                alert('请选择食材');
                return;
            }

            const ingredient = ingredientsDB[ingredientKey];
            selectedIngredients.push({
                key: ingredientKey,
                name: ingredient.name,
                amount: amount,
                nutrients: ingredient.nutrients
            });

            updateIngredientList();
            updateDailyMealPlan();
            updateRecipes();
            updateNutrition();
            updateMissingNutrients();

            // Reset inputs
            select.value = '';
            amountInput.value = '100';
        }

        // Update ingredient list display
        function updateIngredientList() {
            const container = document.getElementById('ingredient-list');
            container.innerHTML = '';

            selectedIngredients.forEach((ing, index) => {
                const tag = document.createElement('div');
                tag.className = 'ingredient-tag';
                tag.innerHTML = `
                    ${ing.name} (${ing.amount}克)
                    <span class="remove" onclick="removeIngredient(${index})">×</span>
                `;
                container.appendChild(tag);
            });
        }

            selectedIngredients.splice(index, 1);

            updateDailyMealPlan();
            updateRecipes();
            updateNutrition();
            updateMissingNutrients();
        }

        }

        // Calculate total nutrients
        function calculateTotalNutrients() {
            const totals = {
                protein: 0,
                calcium: 0,
                iron: 0,
                vitaminC: 0,
                vitaminB12: 0,
                omega3: 0,
                fiber: 0,
                calories: 0
            };

            selectedIngredients.forEach(ing => {
                const multiplier = ing.amount / 100; // Convert to per 100g basis
                Object.keys(totals).forEach(nutrient => {
                    totals[nutrient] += (ing.nutrients[nutrient] || 0) * multiplier;
                });
            });

            return totals;
        }

        // 生成每日完整食谱（早餐、午餐、晚餐）
        function updateDailyMealPlan() {
            const container = document.getElementById('daily-meal-container');
            
            if (selectedIngredients.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">添加食材以生成完整的每日食谱（早餐、午餐、晚餐）</p>';
                return;
            }

            const age = parseInt(document.getElementById('user-age').value) || 30;
            const gender = document.getElementById('user-gender').value || 'male';
            const requirements = getDailyRequirements(age, gender);

            // 将食材分类
            const proteins = selectedIngredients.filter(ing => 
                ['tofu', 'tempeh', 'lentils', 'chickpeas', 'black-beans'].includes(ing.key)
            );
            const vegetables = selectedIngredients.filter(ing => 
                ['spinach', 'broccoli', 'kale', 'carrots', 'bell-pepper', 'tomatoes', 'cabbage', 'cauliflower', 'zucchini', 'eggplant'].includes(ing.key)
            );
            const grains = selectedIngredients.filter(ing => 
                ['quinoa', 'brown-rice', 'oats'].includes(ing.key)
            );
            const seeds = selectedIngredients.filter(ing => 
                ['flaxseeds', 'chia-seeds', 'almonds', 'walnuts'].includes(ing.key)
            );
            const others = selectedIngredients.filter(ing => 
                !proteins.includes(ing) && !vegetables.includes(ing) && !grains.includes(ing) && !seeds.includes(ing)
            );

            // 生成早餐 - 优先选择谷物、种子和轻量蔬菜
            const breakfast = [];
            // 早餐优先：谷物、种子、轻量蔬菜
            if (grains.length > 0) {
                breakfast.push(`${grains[0].name}片 ${grains[0].amount}克`);
            }
            if (seeds.length > 0) {
                seeds.slice(0, 2).forEach(seed => {
                    breakfast.push(`${seed.name} ${seed.amount}克`);
                });
            }
            // 选择适合早餐的蔬菜（如菠菜、胡萝卜等）
            const breakfastVegs = vegetables.filter(v => ['spinach', 'carrots', 'cabbage'].includes(v.key));
            if (breakfastVegs.length > 0) {
                breakfast.push(`烫${breakfastVegs[0].name} ${breakfastVegs[0].amount}克`);
            } else if (vegetables.length > 0) {
                breakfast.push(`${vegetables[0].name} ${vegetables[0].amount}克`);
            }
            // 添加其他适合早餐的食材
            others.slice(0, 2).forEach(item => {
                breakfast.push(`${item.name} ${item.amount}克`);
            });

            // 生成午餐 - 最丰富的一餐
            const lunch = {
                appetizer: [],
                main: [],
                staple: [],
                soup: [],
                fruit: []
            };
            
            // 前菜 - 使用未在早餐使用的蔬菜
            const lunchVegs = vegetables.filter(v => !breakfastVegs.includes(v));
            if (lunchVegs.length > 0) {
                const veg = lunchVegs[0];
                const seedForSalad = seeds.find(s => !breakfast.includes(s.name)) || seeds[0];
                if (seedForSalad) {
                    lunch.appetizer.push(`${veg.name}沙拉${veg.amount}克(${seedForSalad.name}${seedForSalad.amount}克)`);
                } else {
                    lunch.appetizer.push(`${veg.name}沙拉 ${veg.amount}克`);

            // 添加其他前菜

                lunch.appetizer.push(`${proteins[0].name}拌${lunchVegs[1].name} ${proteins[0].amount}克`);

            // 主菜 - 使用蛋白质和多种蔬菜

                lunch.main.push(`${proteins[0].name}扒 ${proteins[0].amount}克`);

            if (lunchVegs.length > 1) {
                const veg1 = lunchVegs[1];
                const veg2 = lunchVegs.length > 2 ? lunchVegs[2] : null;
                const protein = proteins.length > 1 ? proteins[1] : null;
                if (protein) {
                    lunch.main.push(`${veg1.name}炖${protein.name} ${veg1.amount}克，${protein.name}${protein.amount}克`);
                } else {
                    lunch.main.push(`${veg1.name}炖蔬菜 ${veg1.amount}克`);
                }
            }
            if (lunchVegs.length > 2) {
                lunch.main.push(`${lunchVegs[2].name}粉丝煲 ${lunchVegs[2].amount}克`);
            }
            if (lunchVegs.length > 3) {
                lunch.main.push(`白灼${lunchVegs[3].name} ${lunchVegs[3].amount}克`);
            }
            
            // 主食 - 使用糙米或其他谷物
            const lunchGrains = grains.filter(g => !breakfast.includes(g.name));
            if (lunchGrains.length > 0) {
                lunch.staple.push(`${lunchGrains[0].name}饭 ${lunchGrains[0].amount}克`);
            } else if (grains.length > 0) {
                lunch.staple.push(`${grains[0].name}饭 ${grains[0].amount}克`);
            }
            const lunchSeeds = seeds.filter(s => !breakfast.includes(s.name));
            if (lunchSeeds.length > 0) {
                lunch.staple.push(`拌${lunchSeeds[0].name} ${lunchSeeds[0].amount}克`);
            }
            
            // 汤品
            lunch.soup.push(`蔬菜味增汤 120克`);
            
            // 水果
            lunch.fruit.push('橙子 60克');

            // 生成晚餐 - 轻量、易消化
            const dinner = [];
            // 晚餐使用剩余的蔬菜

            );
            if (dinnerVegs.length > 0) {

            } else if (vegetables.length > 0) {

            }
            // 晚餐谷物
            const dinnerGrains = grains.filter(g => 
                !breakfast.includes(g.name) && !lunch.staple.some(s => s.includes(g.name))
            );
            if (dinnerGrains.length > 0) {
                dinner.push(`${dinnerGrains[0].name} ${dinnerGrains[0].amount}克`);
            } else if (grains.length > 0) {
                dinner.push(`${grains[0].name} ${grains[0].amount}克`);
            }
            // 晚餐种子粉
            const dinnerSeeds = seeds.filter(s => 
                !breakfast.includes(s.name) && !lunch.staple.some(st => st.includes(s.name))
            );
            if (dinnerSeeds.length > 0) {
                dinner.push(`${dinnerSeeds[0].name}粉 ${dinnerSeeds[0].amount}克`);
            } else if (seeds.length > 0) {
                dinner.push(`${seeds[0].name}粉 ${seeds[0].amount}克`);
            }

            // 计算总营养
            const totals = calculateTotalNutrients();

            // 生成AGES相关建议
            const agesAdvice = generateAGESAdvice(selectedIngredients);

            // 显示
            container.innerHTML = `

                    <h3 style="color: #00695c; margin-bottom: 15px;">📋 每日完整食谱</h3>
                    <p style="color: #555; margin-bottom: 10px;"><strong>适用人群：</strong>${gender === 'male' ? '男性' : '女性'}，${age}岁</p>

                    </div>

                    <div style="margin-top: 20px;">
                        <h4 style="color: #d84315; margin-bottom: 10px;">🍽️ 午餐：</h4>
                        ${lunch.appetizer.length > 0 ? `<div style="padding-left: 20px; margin-bottom: 8px;"><strong>前菜：</strong>${lunch.appetizer.join('、')}</div>` : ''}
                        ${lunch.main.length > 0 ? `<div style="padding-left: 20px; margin-bottom: 8px;"><strong>主菜：</strong>${lunch.main.join('、')}</div>` : ''}
                        ${lunch.staple.length > 0 ? `<div style="padding-left: 20px; margin-bottom: 8px;"><strong>主食：</strong>${lunch.staple.join('、')}</div>` : ''}
                        ${lunch.soup.length > 0 ? `<div style="padding-left: 20px; margin-bottom: 8px;"><strong>汤品：</strong>${lunch.soup.join('、')}</div>` : ''}
                        ${lunch.fruit.length > 0 ? `<div style="padding-left: 20px; margin-bottom: 8px;"><strong>水果：</strong>${lunch.fruit.join('、')}</div>` : ''}
                        <div style="padding-left: 20px; margin-top: 5px;"><strong>补充：</strong>维生素B12一片</div>

        // 生成AGES相关建议 - 按食材、数量、补充元素分列呈现
        function generateAGESAdvice(ingredients) {
            const age = parseInt(document.getElementById('user-age').value) || 30;
            const gender = document.getElementById('user-gender').value || 'male';
            const requirements = getDailyRequirements(age, gender);
            const totals = calculateTotalNutrients();
            
            // 建议食材数据库
            const supplementSuggestions = [];
            
            // 检查并生成补充建议
            // Omega-3
            if (totals.omega3 < requirements.omega3) {
                supplementSuggestions.push({
                    ingredient: '亚麻籽或奇亚籽',
                    amount: '10-15克',
                    supplement: `Omega-3脂肪酸（缺少${(requirements.omega3 - totals.omega3).toFixed(1)}克）`
                });
            }
            
            // 维生素B12
            if (totals.vitaminB12 < requirements.vitaminB12) {
                supplementSuggestions.push({
                    ingredient: '维生素B12补充剂',
                    amount: '1片（2.4微克）',
                    supplement: `维生素B12（缺少${(requirements.vitaminB12 - totals.vitaminB12).toFixed(1)}微克）`
                });
            }
            
            // 蛋白质
            if (totals.protein < requirements.protein) {
                supplementSuggestions.push({
                    ingredient: '豆腐或天贝',
                    amount: '50-100克',
                    supplement: `蛋白质（缺少${(requirements.protein - totals.protein).toFixed(1)}克）`
                });
            }
            
            // 钙
            if (totals.calcium < requirements.calcium) {
                supplementSuggestions.push({
                    ingredient: '羽衣甘蓝或芝麻',
                    amount: '50-100克',
                    supplement: `钙（缺少${(requirements.calcium - totals.calcium).toFixed(0)}毫克）`
                });
            }
            
            // 铁
            if (totals.iron < requirements.iron) {
                supplementSuggestions.push({
                    ingredient: '扁豆或菠菜',
                    amount: '50-100克',
                    supplement: `铁（缺少${(requirements.iron - totals.iron).toFixed(1)}毫克）`
                });
            }
            
            // 维生素C
            if (totals.vitaminC < requirements.vitaminC) {
                supplementSuggestions.push({
                    ingredient: '甜椒或西兰花',
                    amount: '50-100克',
                    supplement: `维生素C（缺少${(requirements.vitaminC - totals.vitaminC).toFixed(1)}毫克）`
                });
            }
            
            // 膳食纤维
            if (totals.fiber < requirements.fiber) {
                supplementSuggestions.push({
                    ingredient: '燕麦或全谷物',
                    amount: '30-50克',
                    supplement: `膳食纤维（缺少${(requirements.fiber - totals.fiber).toFixed(1)}克）`
                });
            }
            
            // B族维生素补充建议
            supplementSuggestions.push({
                ingredient: '全谷物、豆类',
                amount: '适量',
                supplement: '维生素B1、B2、B3、B6（参与能量代谢和细胞修复）'
            });
            
            supplementSuggestions.push({
                ingredient: '深绿色蔬菜',
                amount: '100-150克',
                supplement: '维生素B9（叶酸）、维生素K'
            });
            
            supplementSuggestions.push({
                ingredient: '坚果、种子',
                amount: '20-30克',
                supplement: '维生素E、锌、镁（抗氧化和细胞修复）'
            });
            
            // 抗氧化建议
            const hasAntioxidants = ingredients.some(ing => 
                ['spinach', 'broccoli', 'kale', 'tomatoes', 'bell-pepper', 'carrots'].includes(ing.key)
            );
            
            let header = '';
            if (hasAntioxidants) {
                header = '<p style="margin-bottom: 15px; color: #4caf50; font-weight: 600;">✅ 您的食材包含丰富的抗氧化物质，有助于减少氧化应激。</p>';
            }
            
            // 生成表格
            let tableHTML = `
                ${header}
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                        <thead>
                            <tr style="background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%); color: white;">
                                <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">食材</th>
                                <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">数量</th>
                                <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">补充的元素</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${supplementSuggestions.map((item, index) => `
                                <tr style="background: ${index % 2 === 0 ? '#f9f9f9' : 'white'};">
                                    <td style="padding: 10px; border: 1px solid #ddd;">${item.ingredient}</td>
                                    <td style="padding: 10px; border: 1px solid #ddd;">${item.amount}</td>
                                    <td style="padding: 10px; border: 1px solid #ddd;">${item.supplement}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div style="margin-top: 20px; padding: 15px; background: #fff3e0; border-radius: 8px; border-left: 4px solid #ff9800;">
                    <p style="margin: 5px 0; color: #e65100;"><strong>💡 减少AGES的烹饪建议：</strong></p>
                    <ul style="margin: 10px 0; padding-left: 20px; color: #555;">
                        <li>采用低温烹饪方式（蒸、煮、炖），避免高温煎炸</li>
                        <li>增加生食蔬菜比例，保留更多活性营养素</li>
                        <li>添加香料和香草（如姜、香菜），它们具有抗炎和抗氧化作用</li>
                        <li>保持血糖稳定，避免高糖饮食，因为高血糖会促进AGES形成</li>
                    </ul>
                </div>
            `;
            
            return tableHTML;
        }

        // 更新食谱 - 智能生成多种类别的食谱
        function updateRecipes() {
            const container = document.getElementById('recipes-container');
            
            if (selectedIngredients.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">添加食材以查看食谱建议</p>';
                return;
            }

            const selectedKeys = selectedIngredients.map(ing => ing.key);
            let allRecipes = [];

            // 1. 优先检查组合食谱（需要多种食材搭配）
            combinationRecipes.forEach(comboRecipe => {
                const hasAllRequired = comboRecipe.required.every(req => selectedKeys.includes(req));
                if (hasAllRequired) {
                    const comboIngredients = selectedIngredients.filter(ing => 
                        comboRecipe.required.includes(ing.key)
                    );
                    allRecipes.push({
                        ...comboRecipe,
                        ingredients: comboIngredients.map(i => i.name),
                        isCombo: true
                    });
                }
            });

            // 2. 收集单个食材的食谱
            selectedIngredients.forEach(ing => {
                if (recipesDB[ing.key]) {
                    recipesDB[ing.key].forEach(recipe => {
                        // 检查是否已存在相同名称的食谱
                        const exists = allRecipes.find(r => r.name === recipe.name);
                        if (!exists) {
                            allRecipes.push({
                                ...recipe,
                                ingredients: [ing.name],
                                isCombo: false
                            });
                        } else {
                            // 如果已存在，添加食材到列表
                            if (!exists.ingredients.includes(ing.name)) {
                                exists.ingredients.push(ing.name);
                            }
                        }
                    });
                }
            });

            // 3. 如果没有找到特定食谱，生成通用食谱
            if (allRecipes.length === 0) {
                const ingredientNames = selectedIngredients.map(i => i.name).join('、');
                allRecipes = [
                    { name: `${ingredientNames}混合蔬菜炒`, category: '炒菜', method: '将所有食材切好，热锅快炒，保持蔬菜的脆嫩口感，调味即可。', ingredients: selectedIngredients.map(i => i.name), isCombo: false },
                    { name: `丰盛的${ingredientNames}汤`, category: '汤类', method: '将所有食材切块，放入清汤中煮制，煮至食材软烂，调味即可。', ingredients: selectedIngredients.map(i => i.name), isCombo: false },
                    { name: `新鲜${ingredientNames}沙拉`, category: '沙拉', method: '将蔬菜类食材洗净切好，加入橄榄油、柠檬汁和调味料拌匀即可。', ingredients: selectedIngredients.map(i => i.name), isCombo: false },
                    { name: `${ingredientNames}能量碗`, category: '主食', method: '将主食类食材做底，铺上蔬菜和蛋白质类食材，淋上酱汁即可。', ingredients: selectedIngredients.map(i => i.name), isCombo: false }
                ];
            }

            // 4. 按类别分组食谱，优先显示组合食谱
            const recipesByCategory = {};
            allRecipes.forEach(recipe => {
                if (!recipesByCategory[recipe.category]) {
                    recipesByCategory[recipe.category] = [];
                }
                recipesByCategory[recipe.category].push(recipe);
            });

            // 5. 确保每个类别至少有一道食谱，最多显示10道食谱
            const categories = ['汤类', '炒菜', '沙拉', '主食', '凉菜', '烤制', '甜品', '饮品'];
            let selectedRecipes = [];
            
            // 优先选择组合食谱
            const comboRecipes = allRecipes.filter(r => r.isCombo);
            comboRecipes.forEach(recipe => {
                if (selectedRecipes.length < 10 && !selectedRecipes.find(r => r.name === recipe.name)) {
                    selectedRecipes.push(recipe);
                }
            });
            
            // 然后按类别选择，确保类别多样性
            categories.forEach(category => {
                if (recipesByCategory[category] && recipesByCategory[category].length > 0 && selectedRecipes.length < 10) {
                    // 从该类别中选择一道（优先选择组合食谱）
                    const categoryRecipes = recipesByCategory[category];
                    const comboInCategory = categoryRecipes.filter(r => r.isCombo);
                    const recipeToAdd = comboInCategory.length > 0 
                        ? comboInCategory[0] 
                        : categoryRecipes[Math.floor(Math.random() * categoryRecipes.length)];
                    
                    if (!selectedRecipes.find(r => r.name === recipeToAdd.name)) {
                        selectedRecipes.push(recipeToAdd);
                    }
                }
            });

            // 6. 如果还不够，从剩余食谱中补充
            if (selectedRecipes.length < 10) {
                allRecipes.forEach(recipe => {
                    if (selectedRecipes.length < 10 && !selectedRecipes.find(r => r.name === recipe.name)) {
                        selectedRecipes.push(recipe);
                    }
                });
            }

            // 7. 如果还是不够，确保至少显示4道
            if (selectedRecipes.length === 0) {
                selectedRecipes = allRecipes.slice(0, Math.min(10, allRecipes.length));
            }

            // 8. 显示食谱
            container.innerHTML = '';
            if (selectedRecipes.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">暂无相关食谱，请添加更多食材</p>';
                return;
            }

            // 按类别分组食谱用于显示
            const displayRecipesByCategory = {};
            selectedRecipes.forEach(recipe => {
                if (!displayRecipesByCategory[recipe.category]) {
                    displayRecipesByCategory[recipe.category] = [];
                }
                displayRecipesByCategory[recipe.category].push(recipe);
            });

            // 添加类别标题和食谱网格
            Object.keys(displayRecipesByCategory).forEach(category => {
                // 添加类别标题
                const categoryTitle = document.createElement('div');
                categoryTitle.style.cssText = 'font-size: 1.2em; font-weight: 600; color: #667eea; margin-top: 20px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #667eea;';
                categoryTitle.textContent = `📋 ${category}`;
                container.appendChild(categoryTitle);

                // 创建食谱网格容器
                const recipesGrid = document.createElement('div');
                recipesGrid.className = 'recipes-grid';
                
                displayRecipesByCategory[category].forEach(recipe => {
                    const card = document.createElement('div');
                    card.className = 'recipe-card';
                    
                    // 如果是组合食谱，添加特殊标记
                    if (recipe.isCombo) {
                        card.style.border = '2px solid #667eea';
                        card.style.boxShadow = '0 5px 15px rgba(102, 126, 234, 0.3)';
                    }
                    
                    // 确定使用的食材（优先使用该食谱相关的食材）
                    const recipeIngredients = recipe.ingredients || selectedIngredients.map(i => i.name);
                    const usedIngredients = selectedIngredients.filter(ing => 
                        recipeIngredients.includes(ing.name)
                    );
                    
                    card.innerHTML = `
                        <h3>${recipe.name} ${recipe.isCombo ? '<span style="font-size: 0.7em; color: #667eea; background: #e3f2fd; padding: 2px 8px; border-radius: 10px; margin-left: 8px;">组合推荐</span>' : ''}</h3>
                        <p><strong>主要食材：</strong> ${usedIngredients.map(i => `${i.name} (${i.amount}克)`).join('、')}</p>
                        <p><strong>制作方法：</strong> ${recipe.method}</p>
                        <p style="margin-top: 8px; font-size: 0.9em; color: #666;"><strong>类别：</strong> ${recipe.category}</p>
                    `;
                    recipesGrid.appendChild(card);
                });
                
                container.appendChild(recipesGrid);
            });
        }

        // Update nutrition display
        function updateNutrition() {
            const container = document.getElementById('nutrition-container');
            
            if (selectedIngredients.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">添加食材以查看营养分析</p>';
                return;
            }

            const totals = calculateTotalNutrients();
            
            container.innerHTML = '<div class="nutrients-grid"></div>';
            const grid = container.querySelector('.nutrients-grid');

            const nutrientLabels = {
                protein: { label: '蛋白质', unit: '克' },
                calcium: { label: '钙', unit: '毫克' },
                iron: { label: '铁', unit: '毫克' },
                vitaminC: { label: '维生素C', unit: '毫克' },
                vitaminB12: { label: '维生素B12', unit: '微克' },
                omega3: { label: 'Omega-3', unit: '克' },
                fiber: { label: '膳食纤维', unit: '克' },
                calories: { label: '卡路里', unit: '千卡' }
            };

            Object.keys(nutrientLabels).forEach(nutrient => {
                const card = document.createElement('div');
                card.className = 'nutrient-card';
                card.innerHTML = `
                    <h4>${nutrientLabels[nutrient].label}</h4>
                    <div class="nutrient-value">${totals[nutrient].toFixed(1)}</div>
                    <div class="nutrient-unit">${nutrientLabels[nutrient].unit}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Update missing nutrients
        function updateMissingNutrients() {
            const container = document.getElementById('missing-nutrients-container');
            
            if (selectedIngredients.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">添加食材以查看缺失的营养素</p>';
                return;
            }

            const age = parseInt(document.getElementById('user-age').value) || 30;
            const gender = document.getElementById('user-gender').value || 'male';
            const requirements = getDailyRequirements(age, gender);
            const totals = calculateTotalNutrients();
            const missing = [];

            const nutrientLabels = {
                protein: { label: '蛋白质', unit: '克' },
                calcium: { label: '钙', unit: '毫克' },
                iron: { label: '铁', unit: '毫克' },
                vitaminC: { label: '维生素C', unit: '毫克' },
                vitaminB12: { label: '维生素B12', unit: '微克' },
                omega3: { label: 'Omega-3', unit: '克' },
                fiber: { label: '膳食纤维', unit: '克' }
            };

            Object.keys(nutrientLabels).forEach(nutrient => {
                const current = totals[nutrient] || 0;
                const required = requirements[nutrient];
                const deficit = required - current;

                if (deficit > 0) {
                    missing.push({
                        name: nutrientLabels[nutrient].label,
                        amount: deficit.toFixed(1),
                        unit: nutrientLabels[nutrient].unit,
                        current: current.toFixed(1),
                        required: required
                    });
                }
            });

            if (missing.length === 0) {
                container.innerHTML = `
                    <div class="info-box">
                        <strong>太好了！</strong> 您当前的食材提供了所有必需的每日营养素。继续保持均衡饮食！
                    </div>
                `;
                return;
            }

            // 生成补充建议表格数据
            const supplementTable = [];
            
            missing.forEach(item => {
                let suggestions = [];
                
                if (item.name === '维生素B12') {
                    suggestions.push({
                        ingredient: '维生素B12补充剂',
                        amount: '1片（2.4微克）',
                        supplement: `维生素B12（缺少${item.amount}${item.unit}）`
                    });
                } else if (item.name === 'Omega-3') {
                    suggestions.push({
                        ingredient: '亚麻籽',
                        amount: '10-15克',
                        supplement: `Omega-3（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '奇亚籽',
                        amount: '10-15克',
                        supplement: `Omega-3（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '核桃',
                        amount: '20-30克',
                        supplement: `Omega-3（缺少${item.amount}${item.unit}）`
                    });
                } else if (item.name === '蛋白质') {
                    suggestions.push({
                        ingredient: '豆腐',
                        amount: '50-100克',
                        supplement: `蛋白质（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '天贝',
                        amount: '50-100克',
                        supplement: `蛋白质（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '扁豆',
                        amount: '50-100克',
                        supplement: `蛋白质（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '藜麦',
                        amount: '50-100克',
                        supplement: `蛋白质（缺少${item.amount}${item.unit}）`
                    });
                } else if (item.name === '钙') {
                    suggestions.push({
                        ingredient: '羽衣甘蓝',
                        amount: '50-100克',
                        supplement: `钙（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '芝麻',
                        amount: '20-30克',
                        supplement: `钙（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '豆腐',
                        amount: '50-100克',
                        supplement: `钙（缺少${item.amount}${item.unit}）`
                    });
                } else if (item.name === '铁') {
                    suggestions.push({
                        ingredient: '扁豆',
                        amount: '50-100克',
                        supplement: `铁（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '菠菜',
                        amount: '50-100克',
                        supplement: `铁（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '鹰嘴豆',
                        amount: '50-100克',
                        supplement: `铁（缺少${item.amount}${item.unit}）`
                    });
                } else if (item.name === '维生素C') {
                    suggestions.push({
                        ingredient: '甜椒',
                        amount: '50-100克',
                        supplement: `维生素C（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '西兰花',
                        amount: '50-100克',
                        supplement: `维生素C（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '羽衣甘蓝',
                        amount: '50-100克',
                        supplement: `维生素C（缺少${item.amount}${item.unit}）`
                    });
                } else if (item.name === '膳食纤维') {
                    suggestions.push({
                        ingredient: '燕麦',
                        amount: '30-50克',
                        supplement: `膳食纤维（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '扁豆',
                        amount: '50-100克',
                        supplement: `膳食纤维（缺少${item.amount}${item.unit}）`
                    });
                    suggestions.push({
                        ingredient: '奇亚籽',
                        amount: '10-15克',
                        supplement: `膳食纤维（缺少${item.amount}${item.unit}）`
                    });
                }
                
                supplementTable.push(...suggestions);
            });

            container.innerHTML = `
                <div class="warning">
                    <strong>注意：</strong> 以下营养素低于每日推荐值。建议添加富含这些营养素的食物。
                </div>
                <div class="missing-nutrients">
                    <h3>所需营养素</h3>
                    ${missing.map(item => `
                        <div class="missing-item">
                            <div>
                                <div class="missing-item-name">${item.name}</div>
                                <div style="font-size: 0.85em; color: #666; margin-top: 4px;">
                                    当前：${item.current}${item.unit} / 需要：${item.required}${item.unit}
                                </div>
                            </div>
                            <div class="missing-item-amount">缺少：${item.amount}${item.unit}</div>
                        </div>
                    `).join('')}
                </div>
                ${supplementTable.length > 0 ? `
                    <div style="margin-top: 20px;">
                        <h3 style="color: #c2185b; margin-bottom: 15px;">💡 补充建议</h3>
                        <div style="overflow-x: auto;">
                            <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                                <thead>
                                    <tr style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); color: white;">
                                        <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">食材</th>
                                        <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">数量</th>
                                        <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">补充的元素</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${supplementTable.map((item, index) => `
                                        <tr style="background: ${index % 2 === 0 ? '#f9f9f9' : 'white'};">
                                            <td style="padding: 10px; border: 1px solid #ddd;">${item.ingredient}</td>
                                            <td style="padding: 10px; border: 1px solid #ddd;">${item.amount}</td>
                                            <td style="padding: 10px; border: 1px solid #ddd;">${item.supplement}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                ` : ''}
            `;
        }

        // Initialize on page load
        window.onload = function() {
            initIngredientSelect();
        };
    </script>
</body>
</html>
